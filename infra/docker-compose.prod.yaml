version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: bun-elysia-paseto-postgres
    environment:
      POSTGRES_DB: bun_elysia_paseto
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bun-elysia-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: bun-elysia-paseto-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bun-elysia-network
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: infra/docker/production.dockerfile
    container_name: bun-elysia-paseto-api
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/bun_elysia_paseto
      DATABASE_POOL_MIN: 2
      DATABASE_POOL_MAX: 10
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      REDIS_DB: 0
      PASETO_LOCAL_KEY: ${PASETO_LOCAL_KEY}
      PASETO_PUBLIC_KEY: ${PASETO_PUBLIC_KEY}
      PASETO_SECRET_KEY: ${PASETO_SECRET_KEY}
      ACCESS_TOKEN_EXPIRY_MINUTES: 15
      REFRESH_TOKEN_EXPIRY_DAYS: 7
      RATE_LIMIT_ENABLED: "true"
      RATE_LIMIT_WINDOW_SECONDS: 60
      RATE_LIMIT_MAX_REQUESTS: 100
      LOG_LEVEL: info
      LOG_PRETTY: "false"
      LOG_FORMAT: json
      CORS_ORIGIN: "*"
      CORS_CREDENTIALS: "true"
      CORS_METHODS: "GET,POST,PUT,DELETE,PATCH"
      CORS_ALLOWED_HEADERS: "Content-Type,Authorization"
      BCRYPT_ROUNDS: 12
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - bun-elysia-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: bun-elysia-paseto-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - bun-elysia-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  bun-elysia-network:
    driver: bridge
