apiVersion: v1
kind: Secret
metadata:
  name: bun-elysia-paseto-api-secret
  namespace: default
  labels:
    app: bun-elysia-paseto-api
type: Opaque
stringData:
  # Database Connection URL
  # Format: postgresql://user:password@host:port/database
  DATABASE_URL: "postgresql://postgres:postgres@postgres-service:5432/bun_elysia_paseto"

  # Redis Password (if required)
  REDIS_PASSWORD: ""

  # PASETO v4.local key for encrypted access tokens (symmetric encryption)
  # Generate with: bun run scripts/generate-paseto-keys.ts
  PASETO_LOCAL_KEY: "k4.local.<your-generated-local-key>"

  # PASETO v4.public keys for signed refresh tokens (asymmetric signing)
  # Secret key NEVER commits to git! Public key is safe to share.
  PASETO_PUBLIC_KEY: "k4.public.<your-generated-public-key>"
  PASETO_SECRET_KEY: "k4.secret.<your-generated-secret-key>"
